<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Easy Run — Newman Run Odyssey</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@1,800;1,900&display=swap">
  <link rel="preconnect" href="https://api.fontshare.com" />
  <link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@800,900&f[]=satoshi@400,500,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../style.css" />
  <style>
    .pl-page {
      padding-top: 120px;
      padding-bottom: var(--sp-16);
      min-height: 100vh;
    }

    .pl-inner {
      max-width: var(--content);
      margin: 0 auto;
      padding: 0 var(--gutter);
    }

    /* Back link */
    .pl-back {
      display: inline-flex;
      align-items: center;
      gap: 0.5em;
      font-family: var(--font-body);
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--color-muted);
      text-decoration: none;
      margin-bottom: var(--sp-10);
      transition: color var(--tr);
    }
    .pl-back:hover { color: var(--color-accent); }

    /* Header block */
    .pl-header {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--sp-10);
      align-items: end;
      margin-bottom: var(--sp-10);
      padding-bottom: var(--sp-8);
      border-bottom: 1px solid var(--color-border);
    }

    .pl-title {
      font-family: var(--font-display);
      font-size: clamp(4rem, 9vw, 9rem);
      font-weight: 900;
      letter-spacing: -0.04em;
      line-height: 0.88;
      text-transform: uppercase;
      color: var(--color-accent);
    }

    .pl-meta {
      display: flex;
      flex-direction: column;
      gap: var(--sp-4);
      padding-bottom: 0.4rem;
    }

    .pl-bpm {
      font-family: var(--font-display);
      font-size: clamp(1.8rem, 3vw, 2.8rem);
      font-weight: 900;
      letter-spacing: -0.02em;
      color: var(--color-accent);
    }

    .pl-genres {
      font-family: var(--font-body);
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--color-muted);
      letter-spacing: 0.04em;
      line-height: 1.6;
    }

    .pl-desc {
      font-family: var(--font-body);
      font-size: 0.85rem;
      color: var(--color-muted);
      line-height: 1.7;
      max-width: 38ch;
    }

    /* Tracklist */
    .pl-tracklist {
      margin-bottom: var(--sp-12);
    }

    .pl-tracklist-header {
      display: grid;
      grid-template-columns: 2rem 1fr 1fr 4rem;
      gap: var(--sp-4);
      padding: 0 0 var(--sp-3);
      border-bottom: 1px solid var(--color-border);
      margin-bottom: var(--sp-2);
    }

    .pl-tracklist-header span {
      font-family: var(--font-body);
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--color-muted);
    }

    .pl-track {
      display: grid;
      grid-template-columns: 2rem 1fr 1fr 4rem;
      gap: var(--sp-4);
      align-items: center;
      padding: var(--sp-3) 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }

    .pl-track-num {
      font-family: var(--font-body);
      font-size: 0.7rem;
      color: var(--color-muted);
      font-weight: 500;
    }

    .pl-track-title {
      font-family: var(--font-body);
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--color-white);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .pl-track-artist {
      font-family: var(--font-body);
      font-size: 0.85rem;
      font-weight: 400;
      color: var(--color-muted);
    }

    .pl-track-bpm {
      font-family: var(--font-body);
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--color-accent);
      text-align: right;
    }

    /* Spotify embed with fade overlay */
    .pl-embed {
      margin-top: var(--sp-12);
    }

    .pl-embed-label {
      font-family: var(--font-body);
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--color-muted);
      margin-bottom: var(--sp-4);
    }

    .pl-embed-wrap {
      position: relative;
    }

    .pl-embed-wrap::before,
    .pl-embed-wrap::after {
      content: '';
      position: absolute;
      left: 0;
      right: 0;
      height: 80px;
      z-index: 2;
      pointer-events: none;
    }
    .pl-embed-wrap::before {
      top: 0;
      background: linear-gradient(to bottom, #0a0a0a 0%, transparent 100%);
    }
    .pl-embed-wrap::after {
      bottom: 0;
      background: linear-gradient(to top, #0a0a0a 0%, transparent 100%);
    }

    .pl-embed-wrap iframe {
      width: 100%;
      border: none;
      display: block;
    }

    @media (max-width: 768px) {
      .pl-header { grid-template-columns: 1fr; gap: var(--sp-6); }
      .pl-tracklist-header,
      .pl-track { grid-template-columns: 2rem 1fr 4rem; }
      .pl-track-artist { display: none; }
      .pl-tracklist-header span:nth-child(3) { display: none; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="site-header" id="site-header">
    <div class="header-inner">
      <a href="../index.html" class="logo" aria-label="Newman Run Odyssey">
        <img src="../logo-header.svg" alt="Newman Run Odyssey" class="logo-svg-header" />
      </a>
      <nav class="site-nav" aria-label="Основная навигация">
        <a href="index.html">PLAYLISTS</a>
        <a href="../index.html#articles">STORIES</a>
        <a href="../index.html#motivation">MOTIVATION</a>
      </nav>
    </div>
  </header>

  <main class="pl-page">
    <div class="pl-inner">

      <a href="index.html" class="pl-back">← Все плейлисты</a>

      <!-- HEADER -->
      <div class="pl-header">
        <div>
          <h1 class="pl-title">EASY<br/>RUN</h1>
        </div>
        <div class="pl-meta">
          <div class="pl-bpm">100–125 BPM</div>
          <div class="pl-genres">Afro House<br/>Deep House<br/>Pop Rock & etc.</div>
          <p class="pl-desc">Плейлист для лёгких восстановительных пробежек. Ритм держит темп, не перегружает — ты в потоке.</p>
        </div>
      </div>

      <!-- SPOTIFY EMBED -->
      <div class="pl-embed">
        <p class="pl-embed-label">Слушать в Spotify</p>
        <div class="pl-embed-wrap">
          <iframe
            src="https://open.spotify.com/embed/playlist/5OsPPT5bDK82nU9ZtfKAC3?utm_source=generator&theme=0"
            width="100%"
            height="700"
            frameborder="0"
            allowfullscreen=""
            allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
            loading="lazy">
          </iframe>
        </div>
      </div>

    </div>
  </main>

  <!-- FOOTER -->
  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-logo">
        <img src="../logo-footer.svg" alt="Newman Run Odyssey" class="logo-svg-footer" />
      </div>
      <div class="footer-copy">© 2026 Newman Run Odyssey. All rights reserved.</div>
    </div>
  </footer>

  <script>
    const hdr = document.getElementById('site-header');
    window.addEventListener('scroll', () => {
      hdr.classList.toggle('scrolled', window.scrollY > 40);
    }, { passive: true });
  </script>

</body>
</html>
